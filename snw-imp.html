<!-- 字型：與原站類似的 Noto Sans -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>  
  :root {
  --bg1: #0f172a;
  --bg2: #1e293b;
  --bg3: #020617;

  --text: #f9fafb;
  --text-muted: #9ca3af;
  --text-dim: #6b7280;

  --c1: #38bdf8;
  --c2: #22c55e;
  --c3: #fb923c;
  --c4: #a855f7;
}

/* 全域設定 */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans TC', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  color: var(--text);
  /* 漸層背景 + 背後光暈 */
  background:
    radial-gradient(circle at 10% 20%, rgba(56,189,248,0.25), transparent 55%),
    radial-gradient(circle at 90% 80%, rgba(168,85,247,0.25), transparent 55%),
    linear-gradient(135deg, var(--bg3), var(--bg1), var(--bg2));
}

/* 玻璃共用樣式 */
.glass-panel {
  background: radial-gradient(circle at top left, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow:
    0 18px 45px rgba(15,23,42,0.65),
    0 0 0 1px rgba(148,163,184,0.1) inset;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

/* 頂端導覽列（半透明玻璃） */
.site-header {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 10px 24px;
}
.site-header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-header-bar {
  @apply glass-panel;
}
.site-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.site-sub {
  font-size: 11px;
  color: var(--text-muted);
}
.nav-links {
  display: flex;
  gap: 12px;
  font-size: 13px;
}
.nav-link a {
  color: #e5e7eb;
  text-decoration: none;
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(15,23,42,0.45);
  border: 1px solid rgba(148,163,184,0.4);
  backdrop-filter: blur(16px);
  transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
}
.nav-link a:hover {
  background: rgba(15,23,42,0.9);
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(15,23,42,0.6);
}
.nav-link.active a {
  background: linear-gradient(135deg,#38bdf8,#a855f7);
  border-color: transparent;
}

/* 主要容器 */
.container {
  max-width: 1100px;
  margin: 24px auto 40px;
  padding: 0 20px 0;
}

/* 頁首卡片：玻璃效果 */
.page-head-card {
  padding: 18px 20px 16px;
}
.page-head-card.glass-panel {}

/* 玻璃卡片共用：cat / panel / tags 等都用 glass-panel */
.page-head-card,
.cat-card,
.panel {
  composes: glass-panel;
}

/* 如果瀏覽器不支援 composes，就改成手動加 class="glass-panel" */

/* Header 文字 */
.eyebrow {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.page-title-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: baseline;
  margin-bottom: 4px;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.01em;
}
.page-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(15,23,42,0.8);
  border: 1px solid rgba(148,163,184,0.7);
}
.page-desc {
  font-size: 13px;
  color: var(--text-muted);
}

/* 類別卡片玻璃 */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4,minmax(0,1fr));
  gap: 12px;
  margin-top: 16px;
  margin-bottom: 18px;
}
.cat-card {
  padding: 12px 12px 10px;
  border-radius: 16px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: transform 0.12s, box-shadow 0.18s, border-color 0.18s, background 0.18s;
}
.cat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 40px rgba(15,23,42,0.85);
}
.cat-card.active {
  border-color: rgba(248,250,252,0.9);
  background: radial-gradient(circle at top left, rgba(255,255,255,0.24), rgba(15,23,42,0.2));
}
.cat-row-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cat-label {
  font-size: 13px;
  font-weight: 600;
}
.cat-icon {
  font-size: 18px;
}
.cat-count {
  font-size: 22px;
  font-weight: 700;
}
.cat-sub {
  font-size: 11px;
  color: var(--text-muted);
}
.cat-card[data-ci="0"] .cat-count { color: var(--c1); }
.cat-card[data-ci="1"] .cat-count { color: var(--c2); }
.cat-card[data-ci="2"] .cat-count { color: var(--c3); }
.cat-card[data-ci="3"] .cat-count { color: var(--c4); }

/* 主內容玻璃區塊 */
.content-grid {
  display: grid;
  grid-template-columns: minmax(0,1.6fr) minmax(0,1fr);
  gap: 18px;
  align-items: flex-start;
}
.panel {
  padding: 14px 14px 12px;
  border-radius: 16px;
}
.panel-header {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 10px;
}
.panel-title {
  font-size: 14px;
  font-weight: 600;
}
.panel-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.55);
  background: rgba(15,23,42,0.6);
}

/* 條列圖 */
.bar-scroll {
  max-height: 460px;
  overflow-y: auto;
  padding-right: 4px;
}
.bar-scroll::-webkit-scrollbar{width:4px;}
.bar-scroll::-webkit-scrollbar-thumb{
  background: rgba(148,163,184,0.9);
  border-radius:999px;
}
.bar-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
  padding:4px 4px;
  border-radius:8px;
  cursor:pointer;
  transition:background 0.12s, transform 0.12s;
}
.bar-row:hover{
  background:rgba(15,23,42,0.7);
  transform:translateY(-1px);
}
.bar-name{
  width:110px;
  min-width:110px;
  font-size:12px;
  color:var(--text-muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.bar-track{
  flex:1;
  height:24px;
  background:rgba(15,23,42,0.7);
  border-radius:999px;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 8px;
  min-width:40px;
  transition:width 0.4s ease-out;
}
.bar-val{
  font-size:11px;
  font-weight:600;
}
.bar-town{
  width:52px;
  min-width:52px;
  font-size:11px;
  color:var(--text-dim);
  text-align:right;
}

/* 右側玻璃區塊 */
.right-panel{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.donut-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:8px;
}
canvas#donut{
  flex-shrink:0;
}
.donut-legend{
  flex:1;
}
.donut-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 6px;
  border-radius:999px;
  cursor:pointer;
  font-size:12px;
  transition:background 0.12s, transform 0.12s;
}
.donut-item:hover{
  background:rgba(15,23,42,0.8);
  transform:translateY(-1px);
}
.donut-item.active{
  background:linear-gradient(135deg,rgba(56,189,248,0.4),rgba(168,85,247,0.4));
}
.donut-dot{
  width:8px;
  height:8px;
  border-radius:999px;
}
.donut-n{
  font-size:13px;
  font-weight:600;
}

/* 統計卡玻璃 */
.stat-row{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.stat-card{
  border-radius:14px;
  padding:10px 10px 8px;
  background:rgba(15,23,42,0.75);
  border:1px solid rgba(148,163,184,0.8);
  backdrop-filter: blur(16px);
}
.stat-label{
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:0.08em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.stat-val{
  font-size:18px;
  font-weight:700;
}
.stat-unit{
  font-size:11px;
  color:var(--text-muted);
  margin-left:2px;
}

/* 標籤玻璃 */
.tags-panel{
  max-height:260px;
  overflow-y:auto;
}
.tags-panel::-webkit-scrollbar{width:4px;}
.tags-panel::-webkit-scrollbar-thumb{
  background:rgba(148,163,184,0.9);
  border-radius:999px;
}
.tags-title{
  font-size:13px;
  font-weight:600;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:8px;
}
.tags-title-count{
  font-size:11px;
  padding:2px 7px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,0.85);
  background:rgba(15,23,42,0.7);
}
.tag-grid{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.school-tag{
  font-size:11px;
  padding:3px 10px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,0.9);
  background:rgba(15,23,42,0.85);
  color:#e5e7eb;
}

/* 頁尾 */
.footer{
  margin-top:18px;
  font-size:11px;
  color:var(--text-dim);
  display:flex;
  justify-content:space-between;
}

/* RWD */
@media(max-width:900px){
  .content-grid{
    grid-template-columns:minmax(0,1fr);
  }
  .cat-grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
  .footer{
    flex-direction:column;
    gap:4px;
    align-items:flex-start;
  }
}

let selCat = 0;
const counts = [0,1,2,3].map(ci => schools.filter(s=>s.c[ci]===1).length);
document.getElementById('totalCount').textContent = schools.length;

function totalStudents(ci) {
  return schools.filter(s=>s.c[ci]===1).reduce((a,s)=>a+s.s,0);
}
function avgStudents(ci) {
  const list = schools.filter(s=>s.c[ci]===1);
  return list.length ? Math.round(list.reduce((a,s)=>a+s.s,0)/list.length) : 0;
}

function select(ci) {
  selCat = ci;
  document.querySelectorAll('.cat-card').forEach(el => el.classList.remove('active'));
  document.querySelector(`.cat-card[data-ci="${ci}"]`).classList.add('active');

  [0,1,2,3].forEach(i => {
    const b = document.getElementById('panelBadge'+i);
    if (!b) return;
    b.style.display = i===ci ? 'inline-block' : 'none';
  });

  const titles = ['網路改善（教育處補助）','局部網路改善（學校自費）','建議改善名單','網路機房整線（學校自費）'];
  document.getElementById('panelTitle').textContent = titles[ci];

  renderBars(ci);
  renderTags(ci);
  renderStats(ci);
  drawDonut(ci);
}

function renderBars(ci) {
  const list = schools.filter(s=>s.c[ci]===1).sort((a,b)=>b.s-a.s);
  const max = list[0]?.s || 1;
  const color = COLORS[ci];
  const bg = COLORS_BG[ci];
  const border = COLORS_BORDER[ci];
  const barList = document.getElementById('barList');
  barList.innerHTML = '';

  list.forEach((s,i) => {
    const pct = Math.round((s.s/max)*100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-name" title="${s.t} ${s.name}">${s.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${bg};border:1px solid ${border};">
          <span class="bar-val" style="color:${color};">${s.s}</span>
        </div>
      </div>
      <div class="bar-town">${s.t}</div>`;
    barList.appendChild(row);
    setTimeout(() => {
      row.querySelector('.bar-fill').style.width = pct+'%';
    }, 20 + i*12);
  });

  const badge = document.getElementById('panelBadge'+ci);
  if (badge) badge.textContent = counts[ci]+' 所學校';
}

function renderTags(ci) {
  const list = schools.filter(s=>s.c[ci]===1).sort((a,b)=>b.s-a.s);
  const color = COLORS[ci];
  const bg = COLORS_BG[ci];
  const border = COLORS_BORDER[ci];
  const tc = document.getElementById('tagsCount');
  tc.textContent = list.length+' 所';
  tc.style.background = bg;
  tc.style.color = color;

  document.getElementById('tagGrid').innerHTML = list.map(s =>
    `<span class="school-tag" style="background:${bg};border-color:${border};color:${color};" title="${s.s} 人">${s.name}</span>`
  ).join('');
}

function renderStats(ci) {
  const sr = document.getElementById('statRow');
  const color = COLORS[ci];
  const total = totalStudents(ci);
  const avg = avgStudents(ci);
  sr.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">涵蓋學生人數</div>
      <div class="stat-val" style="color:${color}">${total.toLocaleString()}<span class="stat-unit">人</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均每校人數</div>
      <div class="stat-val" style="color:${color}">${avg}<span class="stat-unit">人</span></div>
    </div>`;
}

function drawDonut(activeCi) {
  const canvas = document.getElementById('donut');
  const ctx = canvas.getContext('2d');
  const W = 100, H = 100;
  const cx = W/2, cy = H/2, r = 34, inner = 22;
  ctx.clearRect(0,0,W,H);

  const total = counts.reduce((a,b)=>a+b,0);
  let start = -Math.PI/2;

  counts.forEach((v, i) => {
    const sweep = (v/total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy, i===activeCi ? r+3 : r, start, start+sweep);
    ctx.closePath();
    ctx.fillStyle = i===activeCi ? COLORS[i] : COLORS_BG[i];
    ctx.fill();
    start += sweep;
  });

  ctx.beginPath();
  ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  ctx.fillStyle = COLORS[activeCi];
  ctx.font = 'bold 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(counts[activeCi], cx, cy-6);
  ctx.fillStyle = '#6b7280';
  ctx.font = '9px system-ui, sans-serif';
  ctx.fillText('所學校', cx, cy+7);

  const legend = document.getElementById('donutLegend');
  legend.innerHTML = counts.map((v,i) => `
    <div class="donut-item ${i===activeCi?'active':''}" onclick="select(${i})">
      <span class="donut-dot" style="background:${COLORS[i]};${i!==activeCi?'opacity:0.45':''}"></span>
      <span style="flex:1;${i===activeCi?'font-weight:600;':''}">${CATS[i]}</span>
      <span class="donut-n" style="color:${COLORS[i]}">${v}</span>
    </div>`).join('');
}
